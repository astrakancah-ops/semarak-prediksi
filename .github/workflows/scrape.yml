name: Scrape Prediksi
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Scrape and update file
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python scrape.py
          CONTENT=$(base64 -w0 prediksi.json)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/astrakancah-ops/semarak-prediksi/contents/prediksi.json" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          if [ -z "$SHA" ]; then
            echo "ERROR: Could not get SHA"
            exit 1
          fi
          RESULT=$(curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/astrakancah-ops/semarak-prediksi/contents/prediksi.json" \
            -d "{\"message\":\"auto: update prediksi $(date +%Y-%m-%d %H:%M)\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}" \
            | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if 'content' in r:
              print('OK: File updated via API')
          else:
              print('ERROR:', r.get('message', 'Unknown error'))
              exit 1
          ")
